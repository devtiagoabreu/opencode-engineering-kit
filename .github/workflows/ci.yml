name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Check Markdown
        uses: avto-dev/markdown-lint@v1
        with:
          args: "*.md"
          config: ".markdownlint.json"
      
      - name: Check Shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
      
      - name: Check YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_file: '.yamllint.yml'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Test skill format
        run: bash tests/skills/test-skill-format.sh
      
      - name: Test skill content
        run: bash tests/skills/test-skill-content.sh
      
      - name: Test agent format
        run: bash tests/agents/test-agent-format.sh
      
      - name: Test template format
        run: bash tests/templates/test-template-format.sh
      
      - name: Test bootstrap script
        run: bash tests/scripts/test-bootstrap.sh

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Validate frontmatter
        run: |
          echo "Validating YAML frontmatter..."
          find skills agents templates prompts -name "*.md" | while read file; do
            if head -1 "$file" | grep -q "^---"; then
              echo "Checking $file..."
              # Basic YAML validation
              sed -n '/^---$/,/^---$/p' "$file" | grep -q "name:" || echo "WARN: $file may be missing name field"
            fi
          done
      
      - name: Check file sizes
        run: |
          echo "Checking file sizes..."
          find skills -name "SKILL.md" | while read file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 500 ]; then
              echo "ERROR: $file exceeds 500 lines ($lines)"
              exit 1
            fi
          done
          echo "All files within size limits"
