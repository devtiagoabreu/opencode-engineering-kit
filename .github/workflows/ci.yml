name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Markdown
        uses: avto-dev/markdown-lint@v1
        with:
          args: "*.md"
          config: ".markdownlint.json"
      
      - name: Check Shell scripts
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
      
      - name: Check YAML
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: '.'
          config_file: '.yamllint.yml'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run all tests
        run: ./scripts/test.sh

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate frontmatter
        run: |
          echo "Validating YAML frontmatter..."
          find skills agents templates prompts -name "*.md" | while read file; do
            if head -1 "$file" | grep -q "^---"; then
              echo "Checking $file..."
              # Basic YAML validation
              sed -n '/^---$/,/^---$/p' "$file" | grep -q "name:" || echo "WARN: $file may be missing name field"
            fi
          done
      
      - name: Check file sizes
        run: |
          echo "Checking file sizes..."
          find skills -name "SKILL.md" | while read file; do
            lines=$(wc -l < "$file")
            if [ "$lines" -gt 500 ]; then
              echo "ERROR: $file exceeds 500 lines ($lines)"
              exit 1
            fi
          done
          echo "All files within size limits"
      
      - name: Validate metadata
        run: |
          echo "Validating metadata..."
          find skills -name "metadata.json" | while read file; do
            echo "Checking $file..."
            if ! python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "ERROR: $file is not valid JSON"
              exit 1
            fi
          done
          echo "All metadata files are valid"